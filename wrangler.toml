name = "power-yield"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "power-yield-db"
database_id = "d4e82b72-ecbc-4d51-ac8c-ed6833e85116"

# Phase 3: KV Rate Limiting
# Create namespace with: wrangler kv namespace create RATE_LIMIT
# Then replace the id below with the output
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "250a0aa2cb184948bf1cb7ca3313fdce"

# Email notifications via Cloudflare Email Workers are not supported on Pages.
# Admin submissions are visible in the dashboard at /admin/submissions.
